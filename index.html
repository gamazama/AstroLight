<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstroLight™</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    <style>
      :root {
          --ui-blur-amount: 7px;
          --ui-bg-opacity: 0.15;
      }
      body {
          color: #e0e6ed;
          user-select: none; /* Prevent accidental text selection */
          -webkit-user-select: none; /* For Safari */
      }
      input, textarea {
          user-select: text; /* Re-enable selection for text inputs */
          -webkit-user-select: text;
      }
      .dynamic-blur {
          backdrop-filter: blur(var(--ui-blur-amount));
          -webkit-backdrop-filter: blur(var(--ui-blur-amount)); /* For Safari */
          background-color: rgba(20, 25, 40, var(--ui-bg-opacity));
      }
      
      /* --- Modern Custom Scrollbars (Replaces JS Scrollbar) --- */
      .custom-scroll::-webkit-scrollbar {
          width: 6px; /* Thin, elegant width */
          height: 6px; /* For horizontal scroll */
      }
      .custom-scroll::-webkit-scrollbar-track {
          background: rgba(0, 0, 0, 0.1);
          border-radius: 3px;
          margin: 4px 0;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
          background: rgba(255, 255, 255, 0.2);
          border-radius: 3px;
          transition: background 0.2s ease;
      }
      .custom-scroll::-webkit-scrollbar-thumb:hover {
          background: rgba(255, 255, 255, 0.4);
      }
      /* Firefox Fallback */
      .custom-scroll {
          scrollbar-width: thin;
          scrollbar-color: rgba(255, 255, 255, 0.2) rgba(0, 0, 0, 0.1);
      }

      #sound-creator-context-menu ::-webkit-scrollbar {
        width: 6px;
      }
      #sound-creator-context-menu ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.4);
        border-radius: 3px;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 50%;
        cursor: pointer;
        transition: transform 0.2s;
      }
      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
      }
      @keyframes layer-reveal-flash {
          0% { background-color: rgba(255, 255, 255, 0.9); }
          100% { background-color: rgba(255, 255, 255, 0.05); } /* This is the default bg-white/5 */
      }
      .animate-layer-reveal {
          animation: layer-reveal-flash 750ms cubic-bezier(0.25, 1, 0.5, 1);
      }
      @keyframes text-shimmer {
          0% { background-position: 0% 50%; }
          100% { background-position: 200% 50%; }
      }
      .animate-text-shimmer {
          background-size: 200% auto;
          animation: text-shimmer 4s linear infinite;
      }
      .hide-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .hide-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }

      /* --- Light UI Theme --- */
      .light-ui, .light-ui body {
        color: #1a1f3a;
      }
      .light-ui .dynamic-blur {
        background-color: rgba(255, 255, 255, 0.65);
        --ui-bg-opacity: 0.65;
      }
      .light-ui .text-white, .light-ui .text-gray-200 { color: #1a1f3a !important; }
      .light-ui .text-gray-300 { color: #4a5568 !important; }
      .light-ui .text-gray-400 { color: #718096 !important; }
      .light-ui .text-gray-500 { color: #a0aec0 !important; }
      .light-ui .bg-white\/5 { background-color: rgba(0, 0, 0, 0.03); }
      .light-ui .bg-white\/10 { background-color: rgba(0, 0, 0, 0.05); }
      .light-ui .hover\:bg-white\/5:hover { background-color: rgba(0, 0, 0, 0.04) !important; }
      .light-ui .hover\:bg-white\/10:hover { background-color: rgba(0, 0, 0, 0.07) !important; }
      .light-ui .hover\:bg-white\/15:hover { background-color: rgba(0, 0, 0, 0.09) !important; }
      .light-ui .border-white\/10 { border-color: rgba(0, 0, 0, 0.1); }
      .light-ui .border-white\/20 { border-color: rgba(0, 0, 0, 0.2); }
      .light-ui .bg-black\/20 { background-color: rgba(0,0,0,0.05); }
      .light-ui .bg-black\/30 { background-color: rgba(0,0,0,0.08); }
      .light-ui ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.05); }
      .light-ui ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.2); }
      .light-ui .bg-indigo-500\/30 { background-color: rgba(129, 140, 248, 0.4); } /* Brighter indigo */
      .light-ui #sound-creator-context-menu { background-color: rgba(240, 240, 255, 0.9); }
      .light-ui #sound-creator-context-menu ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.3); }

      /* --- Performance Mode --- */
      .performance-mode .dynamic-blur {
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        background-color: rgb(20, 25, 40) !important;
      }
      .light-ui.performance-mode .dynamic-blur {
        background-color: rgb(249, 250, 251) !important;
      }

    </style>

{
  "imports": {

}
</script>
